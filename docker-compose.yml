services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myvideoapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/myvideoapp?sslmode=disable
      - JWT_SECRET=local-dev-secret-change-in-production
      - BACKEND_PUBLIC_URL=http://localhost:8080
    # ストレージ設定だけ切り替え可能に。既定は MinIO。S3 で動かすときは
    # STORAGE_ENV=.env.s3 docker compose up -d backend
    env_file:
      - ${STORAGE_ENV:-.env.minio}
    depends_on:
      - postgres
      - minio

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
